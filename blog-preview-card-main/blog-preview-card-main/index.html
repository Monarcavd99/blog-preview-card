<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main>
    <div class="card">
      <img class="card-image" src="./assets/images/illustration-article.svg" alt="Blog illustration">
      <span class="tag">Learning</span>
      <p class="date">Published 5 May 2026</p>
      <h1 class="title">HTML & CSS foundations</h1>
      <p class="description">
        These lenguages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="author">
        <img class="avatar" src="./assets/images/avatar-victor.jpg" alt="Author avatar">
        <span class="author-name">Victor Daniel</span>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io/profile/Monarcavd99">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
