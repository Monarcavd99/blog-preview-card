<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD</title>
    <link rel="stylesheet" href="aprendisaje.css"></link>
</head>
<body>
  <div class="card">
    <div class="back">
      <div class="text-container">
        <p id="head">¡Feliz Dia, Mamá!</p>
        <div>Gracias por todo tu amor. <br> Este día es para ti.</div>
        <p>¡Te quiero muchísimo! ♥</p>
      </div>
    </div>
    <div class="front">
      <div class="hover-text">Hover To Open</div>
      <div class="cover-shape-large">
        <div class="shape-diamond"></div>
        <div class="shape-block"></div>
      </div>
      <div class="cover-shape-small">
        <div class="shape-diamond"></div>
        <div class="shape-block">
          <div class="cake">
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-top"></div>
            <div class="icing"></div>
            <div class="drip drip1"></div>
            <div class="drip drip2"></div>
            <div class="drip drip3"></div>
            <div class="candle">
              <div class="flame"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="particles"></canvas>
  <script>
    const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = Array.from({length: 80}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * -canvas.height,
  size: Math.random() * 3 + 1,
  speedY: Math.random() * 1 + 0.5,
  speedX: (Math.random() - 0.5) * 0.5,
  opacity: Math.random() * 0.6 + 0.2
}));

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX;
    if (p.y > canvas.height) { p.y = -5; p.x = Math.random() * canvas.width; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201, 168, 76, ${p.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
  </script>
</body>
